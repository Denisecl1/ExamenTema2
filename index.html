<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Bateo 3D</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        body { margin: 0; overflow: hidden; background: black; }

        /* DISEÑO DEL PANEL (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid white;
            z-index: 10;
            user-select: none;
            box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.3);
        }

        #hud span { font-weight: bold; color: #4CAF50; }
        .hud-rojo { color: #ff4444 !important; }

        /* ================= NUEVA PANTALLA DE INICIO ================= */
        #pantallaInicio {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200; /* Por encima de todo */
            backdrop-filter: blur(8px);
        }

        /* Convertimos tu tarjeta en un botón interactivo */
        .card {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.05); /* Efecto de zoom al pasar el mouse */
        }

        .card:active {
            transform: scale(0.95);
        }

        .oculto {
            display: none !important;
        }

        /* Estilo para el nuevo texto PLAY */
        .texto-play {
            color: #ffffff;
            font-size: 50px;
            font-weight: 900;
            font-family: 'Arial Black', Arial, sans-serif;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="pantallaInicio">
        <div class="card" id="botonIniciar">
            <div class="border"></div>
            <div class="content">
              <div class="logo">
                
                <div class="texto-play">PLAY</div>
                
                <span class="trail"></span>
              </div>
              <span class="logo-bottom-text">Game</span>
            </div>
            <span class="bottom-text">Haz clic para comenzar</span>
        </div>
    </div>

    <div id="hud">
        <div>NIVEL: <span id="nivel">1</span></div>
        <div>SCORE: <span id="score">0</span></div>
        <div>FALLOS: <span id="fallos" class="hud-rojo">0</span> / 3</div>
        <div>PELOTAS: <span id="pelotas">0</span> / 10</div>
    </div>

    <div id="gameModal" class="modal-oculto">
        <div class="modal-contenido">
            <h1 id="modalTitulo">TÍTULO</h1>
            <p id="modalMensaje">Mensaje del juego aquí...</p>
            <button id="modalBoton">Continuar</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "fflate": "https://unpkg.com/fflate@0.8.0/lib/browser.module.js"
        }
    }
    </script>

    <script type="module" src="main.js"></script>
    
</body>
</html>

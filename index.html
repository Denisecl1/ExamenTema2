<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Bateo 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }

        /* NUEVO DISEÑO DEL PANEL (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid white;
            z-index: 10;
            user-select: none;
            box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.3);
        }

        #hud span { font-weight: bold; color: #4CAF50; }
        .hud-rojo { color: #ff4444 !important; }
    </style>
</head>
<body>

<div id="hud">
    <div>NIVEL: <span id="nivel">1</span></div>
    <div>SCORE: <span id="score">0</span></div>
    <div>FALLOS: <span id="fallos" class="hud-rojo">0</span> / 3</div>
    <div>PELOTAS: <span id="pelotas">0</span> / 10</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "fflate": "https://unpkg.com/fflate@0.8.0/lib/browser.module.js"
    }
}
</script>

<script type="module" src="main.js"></script>
</body>
</html>
